<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000005">
<title>Fuga Estelar — PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --c1: #00f5ff; --c2: #ff2080; --c3: #7b2fff;
  --gold: #ffd700; --green: #00ff88; --red: #ff3040;
  --orange: #ff8000; --bg: #000005;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Rajdhani',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none}

#game-wrap{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(ellipse at 50% 0%,rgba(123,47,255,.12) 0%,transparent 60%),radial-gradient(ellipse at 0% 100%,rgba(0,245,255,.06) 0%,transparent 50%),var(--bg)}

#canvas-wrap{position:relative;width:min(100vw,calc(100dvh*9/16));height:min(100dvh,calc(100vw*16/9));flex-shrink:0}

canvas{width:100%;height:100%;display:block;cursor:none;border-left:2px solid rgba(0,245,255,.25);border-right:2px solid rgba(0,245,255,.25);box-shadow:0 0 80px rgba(0,245,255,.06),-4px 0 40px rgba(123,47,255,.18),4px 0 40px rgba(255,32,128,.18)}

/* CAMBO UI */
.ui-layer{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,5,.82);z-index:10;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ui-layer.hidden{display:none!important}

.panel{position:relative;background:rgba(0,2,18,.96);border:1px solid rgba(0,245,255,.2);border-radius:18px;padding:28px 24px 24px;max-width:min(90vw,400px);width:100%;max-height:88dvh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--c1) transparent;box-shadow:0 0 0 1px rgba(0,245,255,.05),0 0 50px rgba(0,245,255,.08) inset,0 24px 80px rgba(0,0,0,.9)}
.panel::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(0,245,255,.04) 0%,transparent 50%,rgba(255,32,128,.03) 100%);pointer-events:none}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--c1);border-radius:4px}

.title-main{font-family:'Orbitron',monospace;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;text-align:center;line-height:1;letter-spacing:.05em;background:linear-gradient(135deg,var(--c1) 0%,#fff 40%,var(--c2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.title-sub{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.35em;text-transform:uppercase;color:rgba(0,245,255,.45);text-align:center;margin-bottom:20px}

.btn{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--c1);border:1px solid rgba(0,245,255,.35);border-radius:10px;padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:5px 0;min-height:50px;transition:all .18s ease;touch-action:manipulation;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(0,245,255,.07);opacity:0;transition:opacity .15s}
.btn:active::after{opacity:1}
.btn:active{transform:scale(.97)}
.btn.btn-primary{background:linear-gradient(135deg,rgba(0,245,255,.15),rgba(123,47,255,.12));border-color:var(--c1);box-shadow:0 0 24px rgba(0,245,255,.15)}
.btn.btn-danger{color:var(--red);border-color:rgba(255,48,64,.4);background:rgba(255,48,64,.07)}
.btn.btn-gold{color:var(--gold);border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.07)}
.btn:disabled{opacity:.3;pointer-events:none}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;z-index:5;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,8,.75) 0%,transparent 100%)}
#hud.hidden{display:none!important}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:4px}
.hud-right{align-items:flex-end}
.hud-val{font-family:'Orbitron',monospace;font-size:clamp(.62rem,2.2vw,.82rem);font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:5px}
.hud-center{text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center}
.hud-score{font-family:'Orbitron',monospace;font-size:clamp(.9rem,3.2vw,1.2rem);font-weight:900;color:var(--green);text-shadow:0 0 14px rgba(0,255,136,.5)}
.hud-info{font-size:clamp(.58rem,1.8vw,.72rem);color:rgba(255,255,255,.45);letter-spacing:.1em;font-family:'Rajdhani',sans-serif}
.hud-combo{font-family:'Orbitron',monospace;font-size:clamp(.55rem,1.6vw,.68rem);color:var(--gold);letter-spacing:.06em;min-height:14px;text-shadow:0 0 10px rgba(255,215,0,.5)}

.shield-pips{display:flex;gap:3px}
.shield-pip{width:clamp(10px,2.5vw,14px);height:clamp(10px,2.5vw,14px);border-radius:50%;border:1px solid rgba(0,245,255,.4);background:rgba(0,245,255,.08);transition:all .2s}
.shield-pip.active{background:var(--c1);box-shadow:0 0 10px var(--c1)}
.shield-pip.regen{animation:shieldRegen 1s ease-in-out infinite}
@keyframes shieldRegen{0%,100%{box-shadow:0 0 6px var(--green)}50%{box-shadow:0 0 16px var(--green),0 0 30px var(--green)}}

#btn-pause{pointer-events:auto;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:all .15s;touch-action:manipulation}
#btn-pause:active{background:rgba(255,255,255,.15)}

/* BOSS BAR */
#boss-wrap{position:absolute;top:68px;left:50%;transform:translateX(-50%);width:78%;max-width:360px;z-index:5;display:none;flex-direction:column;gap:4px}
#boss-name{font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:.22em;color:var(--red);text-align:center;text-shadow:0 0 10px var(--red);animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.5}}
#boss-hp-text{font-family:'Orbitron',monospace;font-size:.6rem;color:#fff;text-align:right;opacity:.6}
#boss-track{height:10px;background:rgba(255,48,64,.12);border-radius:5px;border:1px solid rgba(255,48,64,.3);overflow:hidden;position:relative}
#boss-bar{height:100%;background:linear-gradient(90deg,var(--red),#ff8000);border-radius:5px;box-shadow:0 0 14px var(--red);transition:width .1s linear;position:relative}
#boss-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.18);border-radius:5px 5px 0 0}

/* SCORE */
.score-big{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,5vw,1.9rem);font-weight:900;color:var(--green);text-shadow:0 0 24px rgba(0,255,136,.35);text-align:center;margin:10px 0 4px}
.stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.88rem;color:rgba(255,255,255,.7)}
.stat-row:last-child{border-bottom:none}
.stat-val{font-weight:700;color:#fff;font-family:'Orbitron',monospace;font-size:.78rem}

/* SHOP */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.shop-card{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .2s,box-shadow .2s}
.shop-card.equipped{border-color:var(--green);box-shadow:0 0 18px rgba(0,255,136,.12)}
.shop-card.locked{opacity:.75}
.shop-ship-icon{width:40px;height:44px;clip-path:polygon(50% 0%,100% 100%,50% 78%,0% 100%);margin:0 auto}
.shop-name{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;letter-spacing:.04em}
.shop-desc{font-size:.7rem;color:rgba(255,255,255,.5);line-height:1.4;min-height:36px}
.shop-price{font-family:'Orbitron',monospace;font-size:.68rem;color:var(--gold)}
.shop-btn{font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:8px 10px;border-radius:7px;border:1px solid;background:transparent;cursor:pointer;width:100%;min-height:36px;transition:all .15s;touch-action:manipulation}
.shop-btn:active{transform:scale(.96)}
.shop-btn:disabled{opacity:.3;pointer-events:none}

.new-record{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:var(--gold);text-shadow:0 0 24px rgba(255,215,0,.6);text-align:center;margin:6px 0;animation:pulse .7s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.04)}}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,.18),transparent);margin:12px 0}
.dev-credit{text-align:center;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.16);margin-top:14px}
.coins-display{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:var(--gold);text-align:center;margin:6px 0 14px;display:flex;align-items:center;justify-content:center;gap:6px}

/* WEAPON BAR */
#weapon-bar-wrap{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;display:none;align-items:center;gap:7px;background:rgba(0,0,8,.6);padding:6px 12px;border-radius:20px;border:1px solid rgba(0,245,255,.18)}
#weapon-bar-wrap.active{display:flex}
.weapon-label{font-family:'Orbitron',monospace;font-size:.52rem;color:var(--c1);letter-spacing:.1em}
.wep-level{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--c1);font-weight:700}
#weapon-track{width:70px;height:5px;background:rgba(0,245,255,.12);border-radius:3px;border:1px solid rgba(0,245,255,.25);overflow:hidden}
#weapon-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--c3));border-radius:3px;transition:width .1s}

/* COMBO FLOATERS */
.combo-float{position:absolute;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;pointer-events:none;z-index:20;animation:floatUp 1.2s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:1;transform:translateY(-40px) scale(1.1)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}

/* SECTOR FLASH */
#sector-flash{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
#sector-flash.show{opacity:1;transition:none}
#sector-flash span{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,5vw,2rem);font-weight:900;letter-spacing:.15em;text-shadow:0 0 30px var(--c1);color:var(--c1);text-align:center;padding:12px 24px;background:rgba(0,0,0,.5);border:1px solid rgba(0,245,255,.3);border-radius:12px}

/* SCORE MILESTONES */
#milestone-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:0}
.milestone-text{font-family:'Orbitron',monospace;font-size:clamp(1.2rem,4vw,1.6rem);font-weight:900;letter-spacing:.1em;text-align:center;animation:milestoneAnim 2s ease-out forwards}
@keyframes milestoneAnim{0%{opacity:0;transform:scale(.5)}20%{opacity:1;transform:scale(1.15)}40%{transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.9) translateY(-30px)}}

@media(max-width:420px){.panel{padding:20px 16px 18px}.shop-grid{gap:7px}}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="canvas-wrap">
    <canvas id="gc" width="450" height="800"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="hud-left">
        <div class="hud-val" style="color:var(--c1)"><div class="shield-pips" id="shield-pips"></div></div>
        <div class="hud-val" style="color:var(--gold)">🪙 <span id="hud-coins">0</span></div>
        <div class="hud-combo" id="hud-combo"></div>
      </div>
      <div class="hud-center">
        <div class="hud-score" id="hud-score">0</div>
        <div class="hud-info" id="hud-info">SETOR 1 · 0s</div>
      </div>
      <div class="hud-right">
        <div class="hud-val" style="color:rgba(255,255,255,.35);font-size:.62rem" id="hud-hi">REC: 0</div>
        <div id="btn-pause" onclick="togglePause()" title="Pausa">⏸</div>
      </div>
    </div>

    <!-- Boss Bar -->
    <div id="boss-wrap">
      <div id="boss-name">▸ TITAN BOSS ◂</div>
      <div id="boss-hp-text">100%</div>
      <div id="boss-track"><div id="boss-bar"></div></div>
    </div>

    <!-- Weapon Bar -->
    <div id="weapon-bar-wrap">
      <div class="weapon-label">CANHÃO</div>
      <div class="wep-level" id="wep-lv-txt">NV.2</div>
      <div id="weapon-track"><div id="weapon-fill" style="width:100%"></div></div>
    </div>

    <!-- Sector Flash -->
    <div id="sector-flash"><span id="sector-flash-txt"></span></div>

    <!-- Milestone -->
    <div id="milestone-wrap"></div>

    <!-- ══ MENU ══ -->
    <div id="menu" class="ui-layer">
      <div class="panel">
        <div class="title-main">FUGA<br>ESTELAR</div>
        <div class="title-sub">Sobrevivência Extrema</div>
        <div class="coins-display">🪙 <span id="menu-coins">0</span></div>
        <div class="stat-row" style="margin-bottom:14px;border-color:rgba(0,255,136,.15)">
          <span>Recorde</span>
          <span class="stat-val" style="color:var(--green)" id="menu-hi">0</span>
        </div>
        <button class="btn btn-primary" onclick="startGame()">▶ INICIAR COMBATE</button>
        <button class="btn" onclick="openShop()">⚙ HANGAR</button>
        <div class="dev-credit">Desenvolvido por Benj Carhl</div>
      </div>
    </div>

    <!-- ══ PAUSA ══ -->
    <div id="pause-screen" class="ui-layer hidden">
      <div class="panel">
        <div class="title-main" style="font-size:1.4rem;margin-bottom:16px">PAUSADO</div>
        <div class="stat-row"><span>Pontuação atual</span><span class="stat-val" style="color:var(--green)" id="pause-score">0</span></div>
        <div class="divider"></div>
        <button class="btn btn-primary" onclick="togglePause()">▶ CONTINUAR</button>
        <button class="btn btn-danger" onclick="returnToMenu()">✕ DESISTIR</button>
      </div>
    </div>

    <!-- ══ SHOP ══ -->
    <div id="shop" class="ui-layer hidden">
      <div class="panel">
        <div class="title-main" style="font-size:1.2rem">HANGAR</div>
        <div class="title-sub" style="margin-bottom:8px">Seleção de Nave</div>
        <div class="coins-display">🪙 <span id="shop-coins">0</span></div>
        <div class="shop-grid" id="shop-items"></div>
        <button class="btn" style="margin-top:8px" onclick="closeShop()">← VOLTAR</button>
      </div>
    </div>

    <!-- ══ GAME OVER ══ -->
    <div id="game-over" class="ui-layer hidden">
      <div class="panel">
        <div class="title-main" style="background:linear-gradient(135deg,var(--red),#ff8000);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:1.5rem">NAVE<br>DESTRUÍDA</div>
        <div id="new-record-msg" class="new-record hidden">★ NOVO RECORDE ★</div>
        <div class="score-big" id="final-score">0</div>
        <div class="divider"></div>
        <div id="final-stats"></div>
        <div class="divider"></div>
        <button class="btn btn-primary" onclick="startGame()">↻ TENTAR NOVAMENTE</button>
        <button class="btn" onclick="returnToMenu()">⌂ MENU</button>
        <div class="dev-credit">Desenvolvido por Benj Carhl</div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
/* ══════════════════════════════════════════════
   CANVAS
══════════════════════════════════════════════ */
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const W = 450, H = 800, WALL = 18;

/* ══════════════════════════════════════════════
   PERSISTÊNCIA
══════════════════════════════════════════════ */
let highScore  = parseInt(localStorage.getItem('fes_hi'))    || 0;
let totalCoins = parseInt(localStorage.getItem('fes_coins')) || 0;
let unlockedSkins;
try { unlockedSkins = JSON.parse(localStorage.getItem('fes_skins')); if(!Array.isArray(unlockedSkins)) unlockedSkins=[0]; } catch { unlockedSkins=[0]; }
let currentSkin = Math.min(3, Math.max(0, parseInt(localStorage.getItem('fes_skin'))||0));

function saveProgress() {
  if(score > highScore){ highScore = score; localStorage.setItem('fes_hi', highScore); }
  localStorage.setItem('fes_coins', totalCoins);
  localStorage.setItem('fes_skins', JSON.stringify(unlockedSkins));
  localStorage.setItem('fes_skin', currentSkin);
}

/* ══════════════════════════════════════════════
   SKINS
══════════════════════════════════════════════ */
const SKINS = [
  { name:"Interceptor", color:"#00f5ff", trail:"#004466", acc:.18, price:0,     desc:"Nave padrão. Rápida e ágil." },
  { name:"Caça Neon",   color:"#ff2080", trail:"#550020", acc:.15, price:500,   desc:"4 escudos. Disparos em leque." },
  { name:"Fênix",       color:"#00ff88", trail:"#004422", acc:.20, price:2500,  desc:"Regen 1 escudo a cada 45s." },
  { name:"Vanguarda",   color:"#ffd700", trail:"#664400", acc:.16, price:10000, desc:"Canhão Nv.2 inicial + moedas x2." }
];

/* ══════════════════════════════════════════════
   ÁUDIO
══════════════════════════════════════════════ */
let audioCtx=null, audioReady=false;
function initAudio(){ if(audioReady)return; try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); audioReady=true; }catch{} }

const soundQueue = [];
let lastSoundTime = {};
const SOUND_COOLDOWN = { shoot:50, hit:30, coin:80, damage:100 };

function playSound(type){
  if(!audioReady||!audioCtx) return;
  if(audioCtx.state==='suspended'){ audioCtx.resume(); return; }
  const now = performance.now();
  if(SOUND_COOLDOWN[type] && lastSoundTime[type] && now - lastSoundTime[type] < SOUND_COOLDOWN[type]) return;
  lastSoundTime[type] = now;
  try{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t=audioCtx.currentTime;
    switch(type){
      case 'shoot':
        o.type='square'; o.frequency.setValueAtTime(1100,t); o.frequency.exponentialRampToValueAtTime(350,t+.07);
        g.gain.setValueAtTime(.018,t); g.gain.exponentialRampToValueAtTime(.001,t+.07);
        o.start(t); o.stop(t+.07); break;
      case 'hit':
        o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(70,t+.15);
        g.gain.setValueAtTime(.07,t); g.gain.linearRampToValueAtTime(0,t+.15);
        o.start(t); o.stop(t+.15); break;
      case 'titanHit':
        o.type='square'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(50,t+.22);
        g.gain.setValueAtTime(.16,t); g.gain.linearRampToValueAtTime(0,t+.22);
        o.start(t); o.stop(t+.22); break;
      case 'coin':
        o.type='sine'; o.frequency.setValueAtTime(1600,t); o.frequency.setValueAtTime(2200,t+.04);
        g.gain.setValueAtTime(.07,t); g.gain.linearRampToValueAtTime(0,t+.22);
        o.start(t); o.stop(t+.22); break;
      case 'powerup':
        o.type='triangle'; o.frequency.setValueAtTime(400,t); o.frequency.linearRampToValueAtTime(1200,t+.35);
        g.gain.setValueAtTime(.09,t); g.gain.linearRampToValueAtTime(0,t+.35);
        o.start(t); o.stop(t+.35); break;
      case 'shieldUp':
        o.type='sine'; o.frequency.setValueAtTime(250,t); o.frequency.linearRampToValueAtTime(1000,t+.5);
        g.gain.setValueAtTime(.1,t); g.gain.linearRampToValueAtTime(0,t+.5);
        o.start(t); o.stop(t+.5); break;
      case 'damage':
        o.type='square'; o.frequency.setValueAtTime(130,t);
        g.gain.setValueAtTime(.28,t); g.gain.exponentialRampToValueAtTime(.001,t+.45);
        o.start(t); o.stop(t+.45); break;
      case 'bossDead':
        o.type='sine'; o.frequency.setValueAtTime(180,t); o.frequency.linearRampToValueAtTime(1800,t+.5); o.frequency.linearRampToValueAtTime(900,t+.9);
        g.gain.setValueAtTime(.22,t); g.gain.linearRampToValueAtTime(0,t+.9);
        o.start(t); o.stop(t+.9);
        const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.type='square'; o2.frequency.setValueAtTime(360,t+.05); o2.frequency.linearRampToValueAtTime(2800,t+.55);
        g2.gain.setValueAtTime(.08,t+.05); g2.gain.linearRampToValueAtTime(0,t+.55);
        o2.start(t+.05); o2.stop(t+.55); break;
      case 'regen':
        o.type='triangle'; o.frequency.setValueAtTime(700,t); o.frequency.linearRampToValueAtTime(1400,t+.25);
        g.gain.setValueAtTime(.07,t); g.gain.linearRampToValueAtTime(0,t+.25);
        o.start(t); o.stop(t+.25); break;
      case 'combo':
        o.type='sine'; o.frequency.setValueAtTime(900+comboCount*50,t);
        g.gain.setValueAtTime(.06,t); g.gain.linearRampToValueAtTime(0,t+.15);
        o.start(t); o.stop(t+.15); break;
      case 'sector':
        o.type='triangle'; o.frequency.setValueAtTime(300,t); o.frequency.linearRampToValueAtTime(2000,t+.6);
        g.gain.setValueAtTime(.15,t); g.gain.linearRampToValueAtTime(0,t+.6);
        o.start(t); o.stop(t+.6); break;
      case 'wepUp':
        o.type='triangle'; o.frequency.setValueAtTime(500,t); o.frequency.linearRampToValueAtTime(1400,t+.2); o.frequency.linearRampToValueAtTime(2000,t+.35);
        g.gain.setValueAtTime(.1,t); g.gain.linearRampToValueAtTime(0,t+.35);
        o.start(t); o.stop(t+.35); break;
    }
  }catch{}
}

/* ══════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════ */
let gameState='menu', isPaused=false, rafId=null;
let frames=0, score=0, speed=1.0, sector=1;
let bossSpawnFrame=3600, bossMaxHp=200, hudDirty=true, lastHudSec=-1;
let comboCount=0, comboTimer=0, comboMultiplier=1;
let screenShake=0, screenShakeX=0, screenShakeY=0;

/* ══════════════════════════════════════════════
   ENTIDADES
══════════════════════════════════════════════ */
let player, boss;
let asteroids=[], particles=[], pLasers=[], bLasers=[], coins=[], pups=[], stars=[], floaters=[];
let milestones = [1000,5000,10000,25000,50000,100000];
let milestoneShown = new Set();

/* ══════════════════════════════════════════════
   INPUT — mouse + touch
══════════════════════════════════════════════ */
let inputX = W/2, isTouching=false;
function applyInput(cx){
  if(isPaused||gameState!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  inputX=(cx-rect.left)*(W/rect.width);
}
canvas.addEventListener('mousemove', e=>applyInput(e.clientX));
canvas.addEventListener('touchstart', e=>{ initAudio(); e.preventDefault(); isTouching=true; if(e.touches[0]) applyInput(e.touches[0].clientX); },{passive:false});
canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); if(e.touches[0]) applyInput(e.touches[0].clientX); },{passive:false});
canvas.addEventListener('touchend',   e=>{ e.preventDefault(); isTouching=false; },{passive:false});
window.addEventListener('keydown',e=>{
  if((e.code==='Space'||e.key===' ')&&gameState==='playing'){ e.preventDefault(); togglePause(); }
  initAudio();
});

/* ══════════════════════════════════════════════
   COMBO SYSTEM
══════════════════════════════════════════════ */
function addCombo(){
  comboCount++;
  comboTimer=180; // 3 segundos a 60fps
  comboMultiplier = Math.min(1 + Math.floor(comboCount/5)*0.5, 4);
  if(comboCount>=5) playSound('combo');
  hudDirty=true;
}
function resetCombo(){
  if(comboCount>0){ comboCount=0; comboMultiplier=1; hudDirty=true; }
  comboTimer=0;
}

/* ══════════════════════════════════════════════
   SCREEN SHAKE
══════════════════════════════════════════════ */
function addShake(amount){
  screenShake = Math.max(screenShake, amount);
}

/* ══════════════════════════════════════════════
   FLOATERS (texto flutuante de pontos)
══════════════════════════════════════════════ */
function spawnFloater(x,y,text,color='#fff'){
  floaters.push({ x, y, text, color, life:1.0, vy:-1.8 });
}

/* ══════════════════════════════════════════════
   ESTRELAS — 3 camadas parallax
══════════════════════════════════════════════ */
function initStars(){
  stars=[];
  for(let i=0;i<130;i++){
    const lyr=Math.random();
    stars.push({ x:Math.random()*W, y:Math.random()*H, r:lyr>.7?Math.random()*1.6+.8:Math.random()*.9+.2, spd:lyr>.7?Math.random()*2.8+1.8:Math.random()*1.1+.4, alpha:lyr>.7?Math.random()*.6+.4:Math.random()*.3+.1, twinkle:Math.random()*Math.PI*2, twinkleSpd:Math.random()*.05+.02 });
  }
}
function drawStars(){
  stars.forEach(s=>{
    s.y+=s.spd*(speed*.8);
    s.twinkle+=s.twinkleSpd;
    if(s.y>H+2){ s.y=-2; s.x=Math.random()*W; }
    ctx.globalAlpha=s.alpha*(.7+.3*Math.sin(s.twinkle));
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   PARTÍCULAS
══════════════════════════════════════════════ */
function spawnParticles(x,y,color,n,spd,gravity=0){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2, v=Math.random()*spd;
    particles.push({ x, y, vx:Math.cos(ang)*v, vy:Math.sin(ang)*v, life:1, decay:Math.random()*.03+.012, color, r:Math.random()*3+1, gravity });
  }
}
function spawnExplosion(x,y,colors,n=30,spd=8){
  colors.forEach(c=>spawnParticles(x,y,c,Math.floor(n/colors.length),spd,.06));
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=.95; p.vy*=.95;
    p.vy+=p.gravity||0;
    p.life-=p.decay;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.globalAlpha=p.life*.9;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   COLISÃO
══════════════════════════════════════════════ */
function circRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx, dy=cy-ny;
  return dx*dx+dy*dy<=cr*cr;
}
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

/* ══════════════════════════════════════════════
   PLAYER
══════════════════════════════════════════════ */
class Player {
  constructor(){
    this.w=28; this.h=40; this.x=W/2; this.y=H-90; this.hitR=6;
    this.skin=SKINS[currentSkin];
    this.maxShields = currentSkin===1 ? 4 : 3;
    this.shields=this.maxShields;
    this.iFrames=0;
    this.minWep = currentSkin===3 ? 2 : 1;
    this.wepLv=this.minWep;
    this.wepTimer=0; this.wepTimerMax=600;
    this.superTimer=0;
    this.lastShot=0;
    this.regenAccum=0;
    this.thrustPhase=0;
    // Traço de movimento
    this.trailHistory=[];
  }

  update(){
    // Movimento suave com aceleração da skin
    const acc = this.skin.acc || .18;
    this.x+=(inputX-this.x)*acc;
    this.x=Math.max(WALL+this.w/2, Math.min(this.x, W-WALL-this.w/2));

    // Guardar histórico da trilha
    this.trailHistory.push({x:this.x, y:this.y});
    if(this.trailHistory.length>12) this.trailHistory.shift();

    if(this.iFrames>0) this.iFrames--;
    if(this.superTimer>0) this.superTimer--;
    this.thrustPhase+=.18;

    // FÊNIX: regen de escudo
    if(currentSkin===2 && this.shields<this.maxShields){
      this.regenAccum++;
      if(this.regenAccum>=2700){
        this.regenAccum=0; this.shields++;
        playSound('regen'); hudDirty=true;
        spawnParticles(this.x,this.y,'#00ff88',25,3.5);
      }
    }

    // Degradação do canhão
    if(this.wepLv>this.minWep && this.wepTimer>0){
      this.wepTimer--;
      if(this.wepTimer<=0){
        this.wepLv=Math.max(this.minWep,this.wepLv-1);
        if(this.wepLv>this.minWep) this.wepTimer=this.wepTimerMax;
      }
      const wrap=document.getElementById('weapon-bar-wrap');
      const fill=document.getElementById('weapon-fill');
      const lvTxt=document.getElementById('wep-lv-txt');
      if(this.wepLv>this.minWep){
        wrap.classList.add('active');
        fill.style.width=(this.wepTimer/this.wepTimerMax*100)+'%';
        if(lvTxt) lvTxt.textContent='NV.'+this.wepLv;
      } else {
        wrap.classList.remove('active');
      }
    }

    // Disparo automático
    const shotInterval = this.wepLv>=3 ? 14 : 12;
    if(frames-this.lastShot>=shotInterval){ this.shoot(); this.lastShot=frames; }
  }

  draw(){
    const c=this.skin.color, trail=this.skin.trail;

    // Trilha ghosting
    this.trailHistory.forEach((pt,i)=>{
      const alpha=(i/this.trailHistory.length)*0.35;
      const scale=0.5+(i/this.trailHistory.length)*0.5;
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.fillStyle=c;
      ctx.translate(pt.x, pt.y);
      ctx.scale(scale*0.6, scale*0.6);
      ctx.beginPath();
      ctx.moveTo(0,-this.h/2); ctx.lineTo(this.w/2,this.h/2); ctx.lineTo(0,this.h/4); ctx.lineTo(-this.w/2,this.h/2);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    });

    // Super shield
    if(this.superTimer>0){
      const p=this.superTimer/480;
      const pulse=1+.06*Math.sin(frames*.15);
      ctx.save();
      ctx.beginPath(); ctx.arc(this.x,this.y,(this.w+10)*pulse,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,245,255,${p*0.9})`;
      ctx.lineWidth=2.5;
      ctx.shadowBlur=25; ctx.shadowColor='#00f5ff';
      ctx.stroke();
      // Segundo anel
      ctx.beginPath(); ctx.arc(this.x,this.y,(this.w+18)*pulse,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,245,255,${p*0.3})`;
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.restore();
    }

    if(this.iFrames>0 && frames%6<3 && this.superTimer<=0) return;

    ctx.save();
    ctx.fillStyle=c;
    ctx.shadowBlur=20; ctx.shadowColor=c;

    // Motor — propulsão pulsante
    const thrustSz=4+3*Math.abs(Math.sin(this.thrustPhase));
    ctx.globalAlpha=0.7+0.3*Math.sin(this.thrustPhase);
    ctx.fillStyle=trail;
    ctx.beginPath();
    ctx.moveTo(this.x-7, this.y+this.h/2-4);
    ctx.lineTo(this.x+7, this.y+this.h/2-4);
    ctx.lineTo(this.x, this.y+this.h/2+thrustSz*2.5);
    ctx.closePath(); ctx.fill();

    ctx.globalAlpha=1;
    ctx.fillStyle=c;
    ctx.shadowBlur=18; ctx.shadowColor=c;

    // Corpo da nave
    ctx.beginPath();
    ctx.moveTo(this.x, this.y-this.h/2);
    ctx.lineTo(this.x+this.w/2, this.y+this.h/2);
    ctx.lineTo(this.x, this.y+this.h/4);
    ctx.lineTo(this.x-this.w/2, this.y+this.h/2);
    ctx.closePath(); ctx.fill();

    // Asas
    ctx.fillStyle=c+'88';
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.moveTo(this.x-this.w/2,this.y+this.h/2);
    ctx.lineTo(this.x-this.w/2-8,this.y+this.h/2-5);
    ctx.lineTo(this.x-5,this.y+5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(this.x+this.w/2,this.y+this.h/2);
    ctx.lineTo(this.x+this.w/2+8,this.y+this.h/2-5);
    ctx.lineTo(this.x+5,this.y+5);
    ctx.closePath(); ctx.fill();

    // Cockpit
    ctx.fillStyle='rgba(255,255,255,.65)';
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.ellipse(this.x,this.y-5,5,8,0,0,Math.PI*2); ctx.fill();

    // Hitbox visual minúsculo
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath(); ctx.arc(this.x,this.y,this.hitR,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  shoot(){
    playSound('shoot');
    const ly=this.y-this.h/2+5, vy=-17, lw=4, lh=18;
    if(this.wepLv===1){
      pLasers.push({x:this.x, y:ly, vx:0, vy, w:lw, h:lh});
    } else if(this.wepLv===2){
      pLasers.push({x:this.x-11, y:ly, vx:0, vy, w:lw, h:lh});
      pLasers.push({x:this.x+11, y:ly, vx:0, vy, w:lw, h:lh});
    } else {
      pLasers.push({x:this.x,    y:ly, vx:0,    vy, w:lw, h:lh});
      pLasers.push({x:this.x-14, y:ly, vx:-2.8, vy, w:lw, h:lh});
      pLasers.push({x:this.x+14, y:ly, vx: 2.8, vy, w:lw, h:lh});
      // Laser central extra no nível 3
      if(this.wepLv>=3 && frames%24===0){
        pLasers.push({x:this.x, y:ly, vx:0, vy:vy*1.2, w:6, h:24, powerful:true});
      }
    }
  }

  takeDamage(amt=1){
    if(this.superTimer>0||this.iFrames>0) return;
    this.shields=Math.max(0,this.shields-amt);
    playSound('damage');
    addShake(12);
    spawnParticles(this.x,this.y,'#ff3040',45,8);
    spawnParticles(this.x,this.y,'#ff8000',20,5);
    hudDirty=true;
    resetCombo();
    if(this.shields<=0) gameOver();
    else this.iFrames=100;
  }
}

/* ══════════════════════════════════════════════
   BOSS
══════════════════════════════════════════════ */
class Boss {
  constructor(maxHp){
    this.x=W/2; this.y=-140; this.w=140; this.h=85;
    this.hp=maxHp; this.maxHp=maxHp;
    this.vx=3.2*speed;
    this.state='entering';
    this.phase=1;
    this.fireAccum=0;
    this.color='#ff3040';
    this.glowPhase=0;
    this.hitFlash=0;
    this.shieldPulse=0;
  }

  update(){
    this.glowPhase+=.06;
    if(this.hitFlash>0) this.hitFlash--;
    this.shieldPulse+=.04;

    if(this.state==='entering'){
      this.y+=2.8*speed;
      if(this.y>=140) this.state='fighting';
      return;
    }

    if(this.phase===1 && this.hp<=this.maxHp*.5){
      this.phase=2;
      this.vx*=1.5;
      this.color='#ff8000';
      addShake(18);
      spawnExplosion(this.x,this.y,['#ff8000','#ffd700','#ff3040'],60,10);
    }

    this.x+=this.vx;
    if(this.x<WALL+this.w/2||this.x>W-WALL-this.w/2){
      this.vx*=-1;
      this.x=Math.max(WALL+this.w/2,Math.min(this.x,W-WALL-this.w/2));
    }

    const rate=this.phase===1?55:32;
    this.fireAccum++;
    if(this.fireAccum>=rate){
      this.fireAccum=0;
      playSound('shoot');
      const vy=7*speed;
      if(this.phase===1){
        bLasers.push({x:this.x-44,y:this.y+this.h/2, vx:0, vy, w:7, h:22});
        bLasers.push({x:this.x+44,y:this.y+this.h/2, vx:0, vy, w:7, h:22});
      } else {
        bLasers.push({x:this.x,    y:this.y+this.h/2, vx:0,    vy:vy*1.3, w:10, h:22});
        bLasers.push({x:this.x-32, y:this.y+this.h/2, vx:-2.8, vy, w:7, h:20});
        bLasers.push({x:this.x+32, y:this.y+this.h/2, vx: 2.8, vy, w:7, h:20});
        // Fase 2: padrão em espiral ocasional
        if(this.fireAccum===0 && Math.random()<0.3){
          for(let i=0;i<6;i++){
            const a=(i/6)*Math.PI*2;
            bLasers.push({x:this.x, y:this.y+this.h/2, vx:Math.cos(a)*3.5, vy:Math.abs(Math.sin(a))*5+2, w:5, h:16});
          }
        }
      }
    }
  }

  draw(){
    const glow=18+10*Math.sin(this.glowPhase);
    ctx.save();
    ctx.shadowBlur=glow; ctx.shadowColor=this.color;

    // Corpo principal
    const hitAlpha = this.hitFlash>0 ? 1 : 0;
    ctx.fillStyle = this.hitFlash>0 ? '#fff' : this.color;
    const bx=this.x-this.w/2, by=this.y-this.h/2;

    // Forma mais detalhada
    ctx.beginPath();
    ctx.moveTo(this.x, by);
    ctx.lineTo(bx+this.w*.85, by+this.h*.35);
    ctx.lineTo(bx+this.w, by+this.h);
    ctx.lineTo(bx,       by+this.h);
    ctx.lineTo(bx+this.w*.15, by+this.h*.35);
    ctx.closePath(); ctx.fill();

    // Canhões laterais
    ctx.fillStyle=this.phase===2?'#ff6600':'#660000';
    ctx.fillRect(bx-14, by+this.h*.3, 14, 20);
    ctx.fillRect(bx+this.w, by+this.h*.3, 14, 20);
    ctx.fillStyle=this.color;
    ctx.shadowBlur=10;
    ctx.fillRect(bx-16, by+this.h*.3+14, 18, 6);
    ctx.fillRect(bx+this.w-2, by+this.h*.3+14, 18, 6);

    // Core interior
    ctx.fillStyle='#111';
    ctx.fillRect(this.x-30, by+this.h*.1, 60, 28);
    ctx.fillStyle=this.phase===2?'#ffd700':'rgba(255,255,255,.9)';
    ctx.shadowBlur=12; ctx.shadowColor=ctx.fillStyle;
    ctx.fillRect(this.x-20, by+this.h*.15, 40, 16);

    ctx.restore();

    // Barra de HP
    const pct=Math.max(0,this.hp/this.maxHp*100);
    document.getElementById('boss-bar').style.width=pct+'%';
    document.getElementById('boss-hp-text').textContent=Math.ceil(pct)+'%';
    if(this.phase===2) document.getElementById('boss-bar').style.background='linear-gradient(90deg,#ff8000,#ffd700)';
  }

  onHit(){
    this.hitFlash=4;
  }
}

/* ══════════════════════════════════════════════
   SPAWN ASTEROIDES
══════════════════════════════════════════════ */
function spawnAsteroid(){
  const roll=Math.random();
  const tx=WALL+20+Math.random()*(W-WALL*2-40);

  if(roll>.92 && sector>1){
    // Mina rastreadora
    asteroids.push({ type:'mine', x:tx, y:-30, r:14, vy:3.5*speed, vx:0, hp:3 });
  } else if(roll>.80){
    // Titan
    const r=Math.random()*18+32;
    asteroids.push({ type:'titan', x:Math.max(WALL+r,Math.min(tx,W-WALL-r)), y:-r-10, r, vy:2.2*speed, vx:0, hp:Math.ceil(20*speed), rot:0, rotSpd:(Math.random()-.5)*.04 });
  } else if(roll>.68 && sector>2){
    // Meteoro rápido
    asteroids.push({ type:'fast', x:tx, y:-18, r:10, vy:8*speed, vx:(Math.random()-.5)*3*speed, hp:1, rot:0, rotSpd:.12 });
  } else {
    // Normal
    const r=Math.random()*14+8;
    const vx=Math.random()<.5?(Math.random()>.5?1:-1)*(Math.random()*1.8+.5)*speed:0;
    asteroids.push({ type:'normal', x:Math.max(WALL+r,Math.min(tx,W-WALL-r)), y:-r-10, r, vy:(Math.random()*2.5+3.5)*speed, vx, hp:2, rot:0, rotSpd:(Math.random()-.5)*.06 });
  }
}

/* ══════════════════════════════════════════════
   DRAW HELPERS
══════════════════════════════════════════════ */
function drawWalls(){
  const wallColors=['#00f5ff','#00ff88','#7b2fff','#ff2080','#ff3040'];
  const wc=wallColors[Math.min(sector-1,4)];
  ctx.save();
  ctx.fillStyle=wc;
  ctx.shadowBlur=14; ctx.shadowColor=wc;
  // Gradientes nas paredes para aparência mais profissional
  const lgL=ctx.createLinearGradient(0,0,WALL,0);
  lgL.addColorStop(0,'rgba(0,0,0,.8)'); lgL.addColorStop(.5,wc); lgL.addColorStop(1,wc+'66');
  ctx.fillStyle=lgL;
  ctx.fillRect(0,0,WALL,H);
  const lgR=ctx.createLinearGradient(W-WALL,0,W,0);
  lgR.addColorStop(0,wc+'66'); lgR.addColorStop(.5,wc); lgR.addColorStop(1,'rgba(0,0,0,.8)');
  ctx.fillStyle=lgR;
  ctx.fillRect(W-WALL,0,WALL,H);
  ctx.restore();
}

function drawLaser(l, color, glow){
  ctx.save();
  ctx.fillStyle = l.powerful ? '#fff' : color;
  ctx.shadowBlur = l.powerful ? glow*2 : glow;
  ctx.shadowColor = color;
  if(l.powerful){
    // Laser especial — com brilho extra
    const lg=ctx.createLinearGradient(l.x, l.y-l.h/2, l.x, l.y+l.h/2);
    lg.addColorStop(0,'#fff'); lg.addColorStop(.5,color); lg.addColorStop(1,'#fff');
    ctx.fillStyle=lg;
  }
  ctx.fillRect(l.x-l.w/2, l.y-l.h/2, l.w, l.h);
  // Núcleo branco
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.shadowBlur=0;
  ctx.fillRect(l.x-l.w/4, l.y-l.h/2+2, l.w/2, l.h-4);
  ctx.restore();
}

function drawAsteroid(a){
  ctx.save();
  ctx.translate(a.x,a.y);
  if(a.rot!==undefined) ctx.rotate(a.rot);
  ctx.shadowBlur=10;

  if(a.type==='titan'){
    const g=ctx.createRadialGradient(0,0,a.r*.2,0,0,a.r);
    g.addColorStop(0,'#6a2400'); g.addColorStop(1,'#2a0800');
    ctx.fillStyle=g;
    ctx.strokeStyle='#ff6800'; ctx.lineWidth=3; ctx.shadowColor='#ff6800';
    ctx.beginPath(); ctx.arc(0,0,a.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Crateras
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.arc(-a.r*.3, -a.r*.2, a.r*.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( a.r*.35, a.r*.3, a.r*.16, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,104,0,.35)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-a.r*.6,0); ctx.lineTo(a.r*.6,a.r*.35); ctx.stroke();
  } else if(a.type==='mine'){
    const blink=Math.floor(frames/6)%2===0;
    ctx.fillStyle='#300'; ctx.strokeStyle=blink?'#ff3040':'#800'; ctx.lineWidth=2.5; ctx.shadowColor='#ff3040';
    ctx.beginPath(); ctx.arc(0,0,a.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    for(let i=0;i<8;i++){
      const ang=(i/8)*Math.PI*2;
      ctx.strokeStyle=blink?'#ff3040':'#600'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(Math.cos(ang)*a.r,Math.sin(ang)*a.r);
      ctx.lineTo(Math.cos(ang)*(a.r+7),Math.sin(ang)*(a.r+7)); ctx.stroke();
    }
    ctx.fillStyle=blink?'#ff3040':'#800';
    ctx.beginPath(); ctx.arc(0,0,a.r*.4,0,Math.PI*2); ctx.fill();
  } else if(a.type==='fast'){
    ctx.fillStyle='#ff8000'; ctx.strokeStyle='#ffff00'; ctx.lineWidth=1.5; ctx.shadowColor='#ff8000';
    ctx.beginPath(); ctx.arc(0,0,a.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Rastro de velocidade
    ctx.fillStyle='rgba(255,128,0,.3)';
    ctx.beginPath(); ctx.ellipse(0, a.r*.8, a.r*.4, a.r*1.5, 0, 0, Math.PI*2); ctx.fill();
  } else {
    const g=ctx.createRadialGradient(-a.r*.2,-a.r*.2,a.r*.1,0,0,a.r);
    g.addColorStop(0,'#041c2c'); g.addColorStop(1,'#010810');
    ctx.fillStyle=g;
    ctx.strokeStyle='#00f5ff'; ctx.lineWidth=1.8; ctx.shadowColor='#00f5ff';
    ctx.beginPath();
    ctx.moveTo(0,-a.r); ctx.lineTo(a.r*.85,-a.r*.2); ctx.lineTo(a.r*.6,a.r*.8);
    ctx.lineTo(-a.r*.6,a.r*.8); ctx.lineTo(-a.r*.85,-a.r*.2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Reflexo
    ctx.strokeStyle='rgba(0,245,255,.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-a.r*.3,-a.r*.5); ctx.lineTo(a.r*.2,-a.r*.3); ctx.stroke();
  }
  ctx.restore();
}

/* ══════════════════════════════════════════════
   FLOATERS UPDATE
══════════════════════════════════════════════ */
function updateFloaters(){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y+=f.vy; f.life-=.018;
    if(f.life<=0){ floaters.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha=f.life;
    ctx.fillStyle=f.color;
    ctx.shadowBlur=8; ctx.shadowColor=f.color;
    ctx.font=`bold ${Math.floor(12*f.life+8)}px Orbitron, monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════
   HUD UPDATE
══════════════════════════════════════════════ */
function updateHUD(){
  const sec=Math.floor(frames/60);
  if(!hudDirty && lastHudSec===sec) return;
  hudDirty=false; lastHudSec=sec;

  const pips=document.getElementById('shield-pips');
  if(pips&&player){
    let html='';
    const isRegen=currentSkin===2&&player.shields<player.maxShields&&player.regenAccum>2400;
    for(let i=0;i<player.maxShields;i++)
      html+=`<div class="shield-pip${i<player.shields?' active':(isRegen&&i===player.shields?' regen':'')}"></div>`;
    pips.innerHTML=html;
  }

  document.getElementById('hud-score').textContent=score.toLocaleString();
  document.getElementById('hud-info').textContent=`SETOR ${sector} · ${sec}s`;
  document.getElementById('hud-hi').textContent=`REC: ${highScore.toLocaleString()}`;
  document.getElementById('hud-coins').textContent=totalCoins;

  const comboEl=document.getElementById('hud-combo');
  if(comboEl){
    if(comboCount>=5) comboEl.textContent=`🔥 COMBO x${comboCount} (×${comboMultiplier.toFixed(1)})`;
    else comboEl.textContent='';
  }

  document.getElementById('menu-coins').textContent=totalCoins;
  document.getElementById('menu-hi').textContent=highScore.toLocaleString();
  const sc2=document.getElementById('shop-coins'); if(sc2) sc2.textContent=totalCoins;
}

/* ══════════════════════════════════════════════
   MILESTONE CHECK
══════════════════════════════════════════════ */
function checkMilestone(){
  for(const ms of milestones){
    if(score>=ms && !milestoneShown.has(ms)){
      milestoneShown.add(ms);
      const wrap=document.getElementById('milestone-wrap');
      const div=document.createElement('div');
      div.className='milestone-text';
      div.style.color=score>=50000?'#ffd700':score>=10000?'#ff2080':'#00f5ff';
      div.textContent=`${ms.toLocaleString()} PTS!`;
      wrap.innerHTML=''; wrap.appendChild(div);
      setTimeout(()=>{ if(wrap.firstChild===div) wrap.innerHTML=''; },2200);
      playSound('sector');
      break;
    }
  }
}

/* ══════════════════════════════════════════════
   SECTOR FLASH
══════════════════════════════════════════════ */
function showSectorFlash(n){
  const el=document.getElementById('sector-flash');
  const txt=document.getElementById('sector-flash-txt');
  txt.textContent=`SETOR ${n}`;
  el.classList.add('show');
  playSound('sector');
  setTimeout(()=>el.classList.remove('show'),2000);
}

/* ══════════════════════════════════════════════
   GAME LOOP
══════════════════════════════════════════════ */
function loop(){
  if(gameState!=='playing'||isPaused) return;

  // Screen shake
  ctx.save();
  if(screenShake>0){
    screenShakeX=(Math.random()-.5)*screenShake*2;
    screenShakeY=(Math.random()-.5)*screenShake*2;
    ctx.translate(screenShakeX,screenShakeY);
    screenShake*=.8;
    if(screenShake<0.4) screenShake=0;
  }

  // Background
  ctx.fillStyle='#000008';
  ctx.fillRect(-10,-10,W+20,H+20);

  // Nebulosa dinâmica
  const t=frames*.007;
  const ng=ctx.createRadialGradient(W*.5+Math.sin(t)*90,H*.3+Math.cos(t*.6)*70,0,W*.5,H*.5,H*.75);
  const nc=sector>3?`rgba(140,0,70,.05)`:sector>1?`rgba(60,0,120,.05)`:`rgba(0,30,100,.05)`;
  ng.addColorStop(0,nc); ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);

  drawStars();
  frames++;

  // Pontuação: 1pt a cada 3 frames (~20pts/s)
  if(frames%3===0){ score+=1; hudDirty=true; }
  if(frames%60===0) hudDirty=true;

  // Combo decay
  if(comboTimer>0){ comboTimer--; if(comboTimer<=0) resetCombo(); }

  drawWalls();

  // Spawn boss
  if(frames>=bossSpawnFrame&&!boss){
    boss=new Boss(bossMaxHp);
    document.getElementById('boss-wrap').style.display='flex';
    document.getElementById('boss-bar').style.background='linear-gradient(90deg,#ff3040,#ff8000)';
  }

  player.update(); player.draw();
  if(boss){ boss.update(); boss.draw(); }

  // Spawn rate — nunca zero
  const spawnRate=Math.max(8,Math.floor(38/speed));
  if(!boss&&frames%spawnRate===0) spawnAsteroid();

  // Coins
  if(frames%360===0&&Math.random()>.3)
    coins.push({x:WALL+20+Math.random()*(W-WALL*2-40),y:-20,r:11,rot:0});

  // Powerups — tipo mais variado
  if(frames%650===0){
    const kinds=['weapon','shield','shield','weapon','coin_magnet'];
    pups.push({x:WALL+20+Math.random()*(W-WALL*2-40),y:-20,r:14,kind:kinds[Math.floor(Math.random()*kinds.length)]});
  }

  /* ── LASERS DO JOGADOR ── */
  for(let i=pLasers.length-1;i>=0;i--){
    const l=pLasers[i];
    l.x+=l.vx; l.y+=l.vy;
    drawLaser(l, player.skin.color, 10);

    if(l.y<-50||l.x<WALL-10||l.x>W-WALL+10){ pLasers.splice(i,1); continue; }

    // vs boss
    if(boss&&boss.state==='fighting'&&
       rectsOverlap(l.x-l.w/2,l.y-l.h/2,l.w,l.h,boss.x-boss.w/2,boss.y-boss.h/2,boss.w,boss.h)){
      const dmg = l.powerful ? 2 : 1;
      boss.hp-=dmg; boss.onHit();
      playSound('hit');
      spawnParticles(l.x,l.y,'#fff',3,3.5);
      pLasers.splice(i,1);

      if(boss.hp<=0){
        boss=null;
        document.getElementById('boss-wrap').style.display='none';
        playSound('bossDead');
        addShake(20);
        spawnExplosion(W/2,180,['#ffd700','#ff3040','#00f5ff','#ff8000'],150,16);
        spawnFloater(W/2,200,'BOSS ABATIDO!','#ffd700');

        const cm=currentSkin===3?2:1;
        score+=3000;
        totalCoins+=80*cm;
        sector++;
        speed=Math.min(speed*1.2,3.2);
        bossMaxHp=Math.floor(bossMaxHp*2.0);
        bossSpawnFrame=frames+Math.max(2400,Math.floor(3600/speed));
        hudDirty=true;
        saveProgress();
        showSectorFlash(sector);
        addCombo(); addCombo(); addCombo(); addCombo(); addCombo(); // combo boost
      }
      continue;
    }

    // vs asteroides
    let hit=false;
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(circRect(a.x,a.y,a.r,l.x-l.w/2,l.y-l.h/2,l.w,l.h)){
        const dmg=l.powerful?2:1;
        a.hp-=dmg; hit=true;
        if(a.type==='titan'){ playSound('titanHit'); spawnParticles(l.x,l.y,'#ff6800',5,3); }
        else{ playSound('hit'); spawnParticles(l.x,l.y,'#00f5ff',3,2.5); }

        if(a.hp<=0){
          const pc=a.type==='titan'?'#ff6800':a.type==='mine'?'#ff3040':a.type==='fast'?'#ff8000':'#00f5ff';
          spawnParticles(a.x,a.y,pc,a.type==='titan'?40:18,a.type==='titan'?9:5.5);
          const pts=a.type==='titan'?150:a.type==='mine'?80:a.type==='fast'?40:30;
          const scored=Math.floor(pts*comboMultiplier);
          score+=scored;
          spawnFloater(a.x,a.y,'+'+scored, pc);
          addCombo();

          const cm=currentSkin===3?2:1;
          if(a.type==='titan'){
            totalCoins+=8*cm;
            asteroids.push({type:'normal',x:a.x,y:a.y,r:14,vy:4*speed,vx:-2.8*speed,hp:2,rot:0,rotSpd:.07});
            asteroids.push({type:'normal',x:a.x,y:a.y,r:14,vy:4*speed,vx: 2.8*speed,hp:2,rot:0,rotSpd:.07});
          }
          asteroids.splice(j,1);
          hudDirty=true;
        }
        break;
      }
    }
    if(hit) pLasers.splice(i,1);
  }

  /* ── LASERS DO BOSS ── */
  for(let i=bLasers.length-1;i>=0;i--){
    const l=bLasers[i];
    l.x+=l.vx; l.y+=l.vy;
    drawLaser(l,'#ff3040',14);
    if(l.y>H+50||l.x<-50||l.x>W+50){ bLasers.splice(i,1); continue; }
    if(player.iFrames===0&&circRect(player.x,player.y,player.hitR,l.x-l.w/2,l.y-l.h/2,l.w,l.h)){
      player.takeDamage(1);
      bLasers.splice(i,1);
    }
  }

  /* ── ASTEROIDES ── */
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    if(a.type==='mine'){
      const dx=player.x-a.x;
      a.x+=Math.sign(dx)*Math.min(Math.abs(dx)*.04,1.5*speed);
      a.y+=a.vy;
    } else {
      a.y+=a.vy;
      if(a.vx){ a.x+=a.vx; if(a.x-a.r<WALL){a.vx=Math.abs(a.vx);a.x=WALL+a.r;} else if(a.x+a.r>W-WALL){a.vx=-Math.abs(a.vx);a.x=W-WALL-a.r;} }
    }
    if(a.rot!==undefined) a.rot+=a.rotSpd;
    drawAsteroid(a);

    if(a.y>H+a.r+10||a.x<-a.r*3||a.x>W+a.r*3){ asteroids.splice(i,1); continue; }

    const shieldActive=player.superTimer>0;
    const colR=shieldActive?player.w:player.hitR;
    if(Math.hypot(player.x-a.x,player.y-a.y)<colR+a.r){
      if(shieldActive){
        playSound('hit'); addShake(4);
        spawnParticles(a.x,a.y,'#00f5ff',20,5.5);
        const pts=a.type==='titan'?150:a.type==='mine'?80:30;
        score+=Math.floor(pts*comboMultiplier);
        addCombo();
        if(a.type==='titan') totalCoins+=(currentSkin===3?16:8);
        asteroids.splice(i,1); hudDirty=true;
      } else if(player.iFrames===0){
        player.takeDamage(a.type==='titan'?2:1);
        spawnParticles(a.x,a.y,a.type==='titan'?'#ff6800':'#00f5ff',25,6.5);
        asteroids.splice(i,1);
      }
    }
  }

  /* ── MOEDAS ── */
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    c.y+=3*speed; c.rot=(c.rot||0)+.07;
    ctx.save();
    ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    const cg=ctx.createRadialGradient(0,0,c.r*.2,0,0,c.r);
    cg.addColorStop(0,'#fffaaa'); cg.addColorStop(.6,'#ffd700'); cg.addColorStop(1,'#aa8800');
    ctx.fillStyle=cg;
    ctx.shadowBlur=18; ctx.shadowColor='#ffd700';
    ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,.55)';
    ctx.beginPath(); ctx.arc(-2.5,-2.5,c.r*.42,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if(c.y>H+20){ coins.splice(i,1); continue; }
    if(Math.hypot(player.x-c.x,player.y-c.y)<c.r+player.w*.9){
      const cm=currentSkin===3?2:1;
      playSound('coin'); score+=60;
      totalCoins+=1*cm;
      spawnFloater(c.x,c.y,'+🪙','#ffd700');
      coins.splice(i,1); hudDirty=true; saveProgress();
      addCombo();
    }
  }

  /* ── POWERUPS ── */
  for(let i=pups.length-1;i>=0;i--){
    const p=pups[i];
    p.y+=2.5*speed; p.rot=(p.rot||0)+.05;
    const pCols={weapon:'#00f5ff',shield:'#00ff88',coin_magnet:'#ffd700'};
    const pChars={weapon:'W',shield:'S',coin_magnet:'M'};
    const pc=pCols[p.kind]||'#fff', char=pChars[p.kind]||'?';
    ctx.save();
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=pc; ctx.shadowBlur=22; ctx.shadowColor=pc;
    ctx.beginPath();
    for(let k=0;k<6;k++){
      const ang=k*Math.PI/3;
      k===0?ctx.moveTo(Math.cos(ang)*p.r,Math.sin(ang)*p.r):ctx.lineTo(Math.cos(ang)*p.r,Math.sin(ang)*p.r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#000'; ctx.shadowBlur=0;
    ctx.font=`bold ${Math.floor(p.r*.88)}px Orbitron,monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(char,0,1);
    ctx.restore();

    if(p.y>H+20){ pups.splice(i,1); continue; }
    if(Math.hypot(player.x-p.x,player.y-p.y)<p.r+player.w*.85){
      if(p.kind==='weapon'){
        playSound('wepUp');
        if(player.wepLv<3){ player.wepLv++; player.wepTimer=player.wepTimerMax; spawnFloater(p.x,p.y,'CANHÃO+','#00f5ff'); }
        else { score+=350; totalCoins+=(currentSkin===3?16:8); spawnFloater(p.x,p.y,'+350','#00f5ff'); }
      } else if(p.kind==='shield'){
        playSound('shieldUp');
        player.superTimer=520;
        score+=120;
        spawnFloater(p.x,p.y,'ESCUDO!','#00ff88');
      } else if(p.kind==='coin_magnet'){
        // Coin magnet — atrai todas as moedas
        playSound('powerup');
        coins.forEach(c=>{ c.vx=(player.x-c.x)*.08; c.vy=(player.y-c.y)*.08; });
        score+=100; spawnFloater(p.x,p.y,'MAGNETO!','#ffd700');
      }
      pups.splice(i,1); hudDirty=true;
    }
  }

  updateParticles();
  updateFloaters();
  updateHUD();
  checkMilestone();

  ctx.restore(); // restaura do screenShake

  rafId=requestAnimationFrame(loop);
}

/* ══════════════════════════════════════════════
   CONTROLES
══════════════════════════════════════════════ */
function togglePause(){
  if(gameState!=='playing') return;
  initAudio();
  isPaused=!isPaused;
  if(isPaused){
    document.getElementById('pause-screen').classList.remove('hidden');
    document.getElementById('pause-score').textContent=score.toLocaleString()+' pts';
    if(audioCtx&&audioCtx.state==='running') audioCtx.suspend();
  } else {
    document.getElementById('pause-screen').classList.add('hidden');
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
    rafId=requestAnimationFrame(loop);
  }
}

function startGame(){
  initAudio();
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();

  ['menu','game-over','pause-screen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('new-record-msg').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('boss-wrap').style.display='none';
  document.getElementById('weapon-bar-wrap').classList.remove('active');
  document.getElementById('milestone-wrap').innerHTML='';
  document.getElementById('sector-flash').classList.remove('show');

  initStars();
  player=new Player();
  boss=null;
  asteroids=[];particles=[];pLasers=[];bLasers=[];coins=[];pups=[];floaters=[];
  frames=0;score=0;speed=1.2;sector=1;
  bossSpawnFrame=3600;bossMaxHp=200;
  hudDirty=true;lastHudSec=-1;
  comboCount=0;comboTimer=0;comboMultiplier=1;
  screenShake=0;
  inputX=W/2;
  milestoneShown=new Set();

  gameState='playing';isPaused=false;
  updateHUD();
  rafId=requestAnimationFrame(loop);
}

function gameOver(){
  gameState='gameover';
  playSound('damage');
  addShake(25);
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('boss-wrap').style.display='none';
  document.getElementById('weapon-bar-wrap').classList.remove('active');

  const isNew=score>highScore;
  saveProgress();

  if(isNew) document.getElementById('new-record-msg').classList.remove('hidden');

  document.getElementById('final-score').textContent=score.toLocaleString()+' pts';
  document.getElementById('final-stats').innerHTML=`
    <div class="stat-row"><span>Setor alcançado</span><span class="stat-val">${sector}</span></div>
    <div class="stat-row"><span>Tempo de voo</span><span class="stat-val">${Math.floor(frames/60)}s</span></div>
    <div class="stat-row"><span>Maior combo</span><span class="stat-val" style="color:var(--gold)">${comboCount}</span></div>
    <div class="stat-row"><span>Recorde</span><span class="stat-val" style="color:var(--green)">${highScore.toLocaleString()}</span></div>
    <div class="stat-row"><span>Moedas totais</span><span class="stat-val" style="color:var(--gold)">${totalCoins}</span></div>
  `;

  // Delay suave para mostrar o painel após explosão
  setTimeout(()=>{ document.getElementById('game-over').classList.remove('hidden'); },600);
}

function returnToMenu(){
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  gameState='menu'; isPaused=false;
  ['game-over','pause-screen','hud'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('boss-wrap').style.display='none';
  document.getElementById('weapon-bar-wrap').classList.remove('active');
  document.getElementById('menu').classList.remove('hidden');
  ctx.clearRect(0,0,W,H);
  updateHUD();
}

/* ══════════════════════════════════════════════
   SHOP
══════════════════════════════════════════════ */
function openShop(){
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('shop').classList.remove('hidden');
  renderShop();
}
function closeShop(){
  document.getElementById('shop').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
}
function renderShop(){
  const el=document.getElementById('shop-items');
  el.innerHTML='';
  SKINS.forEach((sk,idx)=>{
    const owned=unlockedSkins.includes(idx);
    const equipped=currentSkin===idx;
    const canBuy=!owned&&totalCoins>=sk.price;
    const btnColor=equipped?'var(--green)':owned?'var(--c1)':canBuy?'var(--gold)':'#444';
    const btnText=equipped?'✓ EQUIPADO':owned?'EQUIPAR':`🪙 ${sk.price.toLocaleString()}`;
    const card=document.createElement('div');
    card.className='shop-card'+(equipped?' equipped':'')+((!owned)?' locked':'');
    card.innerHTML=`
      <div class="shop-ship-icon" style="background:${sk.color};box-shadow:0 0 16px ${sk.color}99"></div>
      <div class="shop-name" style="color:${sk.color}">${sk.name}</div>
      <div class="shop-desc">${sk.desc}</div>
      <div class="shop-price">${owned?(equipped?'':'Disponível'):'🪙 '+sk.price.toLocaleString()}</div>
      <button class="shop-btn" style="border-color:${btnColor};color:${btnColor}"
        onclick="buyOrEquip(${idx},${sk.price})" ${!owned&&!canBuy?'disabled':''}>
        ${btnText}
      </button>`;
    el.appendChild(card);
  });
  document.getElementById('shop-coins').textContent=totalCoins;
}
function buyOrEquip(idx,price){
  initAudio();
  if(!unlockedSkins.includes(idx)){
    if(totalCoins>=price){ totalCoins-=price; unlockedSkins.push(idx); currentSkin=idx; playSound('coin'); }
  } else { currentSkin=idx; playSound('powerup'); }
  saveProgress(); updateHUD(); renderShop();
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
const initEvents=['touchstart','pointerdown','click','keydown'];
const initOnce=()=>{ initAudio(); initEvents.forEach(ev=>document.body.removeEventListener(ev,initOnce)); };
initEvents.forEach(ev=>document.body.addEventListener(ev,initOnce,{passive:true}));
updateHUD();
</script>
</body>
</html>
